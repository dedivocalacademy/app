<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Murid – Dedi Vocal Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<script src="api.js"></script>
<style>
:root{
  --bg:#F9F7FF;--purple:#7C3AED;--purple2:#6D28D9;--dark:#1C1026;
  --gold:#F59E0B;--gold2:#D97706;--green:#059669;--teal:#0D9488;
  --red:#EF4444;--muted:#6B7280;--border:#E5E7EB;--white:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;padding-bottom:72px}

/* SCREENS */
#loadingScreen{position:fixed;inset:0;background:linear-gradient(135deg,var(--dark),#2D1B4E);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner-big{width:44px;height:44px;border:4px solid rgba(124,58,237,.3);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingScreen p{color:#fff;font-weight:700;font-size:15px}
#errorScreen{display:none;position:fixed;inset:0;background:var(--bg);z-index:998;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;gap:14px}
#errorScreen.show{display:flex}
#errorScreen h2{font-family:'Fredoka One',cursive;font-size:24px}
#errorScreen p{color:var(--muted);font-size:14px;max-width:300px}

/* HEADER */
.app-header{background:var(--dark);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100}
.logo-mark{width:34px;height:34px;background:var(--teal);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:16px;color:#fff;flex-shrink:0}
.app-title{font-family:'Fredoka One',cursive;font-size:18px;color:#fff}
.app-sub{font-size:10px;color:#9CA3AF;margin-top:-2px}

/* HERO */
.hero-banner{background:linear-gradient(135deg,var(--dark) 0%,#2D1B4E 100%);padding:24px 16px 28px;text-align:center;position:relative;overflow:hidden}
.hero-banner::before{content:'';position:absolute;width:200px;height:200px;background:rgba(13,148,136,.12);border-radius:50%;top:-60px;right:-40px;filter:blur(40px)}
.student-avatar{width:66px;height:66px;background:var(--teal);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:28px;color:#fff;margin:0 auto 10px;border:3px solid rgba(255,255,255,.2)}
.student-name{font-family:'Fredoka One',cursive;font-size:22px;color:#fff;margin-bottom:4px}
.student-sub{font-size:12px;color:#A78BFA;margin-bottom:10px}
.hero-chips{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.hero-chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;color:#D1D5DB}

/* CONTENT */
.content{padding:14px;max-width:600px;margin:0 auto}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid #2D1B4E;display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;transition:all .2s;border:none;background:none;color:#9CA3AF;gap:3px}
.nav-item.active{color:var(--teal)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:700}
.tab-page{display:none}.tab-page.active{display:block}

/* CARDS */
.section-card{background:var(--white);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.card-title{font-weight:800;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* PAKET SESI COUNTDOWN */
.paket-card{background:linear-gradient(135deg,var(--dark) 0%,#2D1B4E 100%);border-radius:18px;padding:20px;margin-bottom:12px;color:#fff;position:relative;overflow:hidden}
.paket-card::before{content:'';position:absolute;width:140px;height:140px;background:rgba(13,148,136,.15);border-radius:50%;bottom:-40px;right:-30px;filter:blur(30px)}
.paket-label{font-size:11px;opacity:.7;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.paket-countdown{display:flex;align-items:baseline;gap:6px}
.paket-sisa{font-family:'Fredoka One',cursive;font-size:52px;line-height:1;color:#5EEAD4}
.paket-from{font-size:16px;opacity:.6}
.paket-label2{font-size:13px;opacity:.8;margin-top:4px;margin-bottom:14px}
.paket-bar-wrap{background:rgba(255,255,255,.12);border-radius:999px;height:10px;overflow:hidden}
.paket-bar{height:10px;border-radius:999px;background:var(--teal);transition:width .5s ease}
.paket-warn{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:8px 12px;margin-top:12px;font-size:12px;font-weight:700;color:#FCA5A5}

/* KBM SESI CARD */
.kbm-card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.kbm-head{padding:12px 14px;background:var(--bg);display:flex;align-items:center;justify-content:space-between}
.kbm-tgl{font-weight:800;font-size:14px}
.kbm-body{padding:12px 14px;border-top:1px solid var(--border)}
.kbm-lesson{font-size:13px;line-height:1.5;color:var(--dark);margin-bottom:8px}
.kbm-foto{width:100%;max-height:220px;object-fit:cover;border-radius:10px;cursor:pointer;display:block}

/* SPP */
.spp-banner{border-radius:16px;padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.spp-sudah{background:linear-gradient(135deg,var(--green) 0%,#047857 100%);color:#fff}
.spp-belum{background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);color:#fff}
.spp-val{font-family:'Fredoka One',cursive;font-size:22px}
.spp-sub{font-size:11px;opacity:.85;margin-top:2px}

/* INFO ROWS */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
.badge-green{background:#ECFDF5;color:var(--green)}
.badge-teal{background:#F0FDFA;color:var(--teal)}
.badge-yellow{background:#FFFBEB;color:var(--gold2)}
.badge-purple{background:#F5F3FF;color:var(--purple2)}
.badge-red{background:#FEF2F2;color:var(--red)}
.prog-online{background:#EEF2FF;color:#4338CA}
.prog-regular{background:#F0FDFA;color:var(--teal)}
.prog-home{background:#FFF7ED;color:#C2410C}
.prog-group{background:#F0FDF4;color:#166534}
.prog-choir{background:#FDF4FF;color:#7E22CE}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(13,148,136,.3);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
.empty-state{text-align:center;padding:28px;color:var(--muted);font-size:14px;font-weight:600}

/* MODAL FOTO */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner-big"></div>
  <p>Memuat portal murid...</p>
</div>

<!-- ERROR -->
<div id="errorScreen">
  <div style="font-size:56px">😕</div>
  <h2>Halaman Tidak Ditemukan</h2>
  <p>Link portal murid tidak valid. Hubungi admin DiVA untuk mendapatkan link yang benar.</p>
  <a href="index.html" style="background:var(--teal);color:#fff;padding:12px 24px;border-radius:12px;font-weight:700;text-decoration:none;margin-top:8px">Kembali ke Beranda</a>
</div>

<!-- APP -->
<div id="appShell" style="display:none">
  <header class="app-header">
    <div class="logo-mark">D</div>
    <div><div class="app-title">DiVA</div><div class="app-sub">Portal Murid</div></div>
  </header>

  <div class="hero-banner">
    <div class="student-avatar" id="studentAvatar">?</div>
    <div class="student-name" id="studentName">–</div>
    <div class="student-sub">Dedi Vocal Academy (DiVA)</div>
    <div class="hero-chips">
      <span class="hero-chip" id="chipProgram">–</span>
      <span class="hero-chip" id="chipGuru">–</span>
      <span class="hero-chip" id="chipSisa">– sesi tersisa</span>
    </div>
  </div>

  <div class="content">

    <!-- BERANDA -->
    <div class="tab-page active" id="tab-beranda">
      <!-- COUNTDOWN PAKET -->
      <div id="paketWidget"></div>

      <!-- KBM TERBARU -->
      <div class="section-card">
        <div class="card-title">📅 KBM Terbaru</div>
        <div id="recentKBM"><span class="spinner"></span></div>
      </div>

      <!-- INFO -->
      <div class="section-card">
        <div class="card-title">ℹ️ Info Saya</div>
        <div id="infoSaya"></div>
      </div>
    </div>

    <!-- HISTORI KBM -->
    <div class="tab-page" id="tab-histori">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input type="month" id="filterHBulan" style="flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;outline:none" onchange="loadHistoriMurid()">
        <button onclick="loadHistoriMurid()" style="background:var(--teal);color:#fff;border:none;padding:9px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer">Filter</button>
      </div>
      <div id="historiList"><span class="spinner"></span></div>
    </div>

    <!-- SPP -->
    <div class="tab-page" id="tab-spp">
      <div id="sppContent"><span class="spinner"></span></div>
    </div>

  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('beranda',this)"><span class="nav-icon">🏠</span><span class="nav-label">Beranda</span></button>
    <button class="nav-item" onclick="showPage('histori',this)"><span class="nav-icon">📅</span><span class="nav-label">Histori KBM</span></button>
    <button class="nav-item" onclick="showPage('spp',this)"><span class="nav-icon">💳</span><span class="nav-label">SPP</span></button>
  </nav>
</div>

<!-- MODAL FOTO -->
<div class="modal-overlay" id="modalFoto" onclick="closeFoto()">
  <div style="max-width:560px;width:100%">
    <img id="fotoFull" style="width:100%;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.5)">
  </div>
</div>

<script>
let muridData = null;
let guruData  = null;
let allSesi   = [];

function thisBulan() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function fmt(n) {
  if (!n) return 'Rp 0';
  return 'Rp ' + Number(n).toLocaleString('id-ID');
}
function progBadgeClass(prog) {
  if (!prog) return '';
  const p = prog.toLowerCase();
  if (p.includes('online'))  return 'prog-online';
  if (p.includes('home'))    return 'prog-home';
  if (p.includes('group'))   return 'prog-group';
  if (p.includes('choir'))   return 'prog-choir';
  return 'prog-regular';
}

function showPage(id, btn) {
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'histori') loadHistoriMurid();
  if (id === 'spp')     renderSPP();
}

function lihatFoto(url) {
  document.getElementById('fotoFull').src = url;
  document.getElementById('modalFoto').classList.add('open');
}
function closeFoto() {
  document.getElementById('modalFoto').classList.remove('open');
}

// ── INIT ─────────────────────────────────────────────
async function init() {
  const params  = new URLSearchParams(location.search);
  const link_id = params.get('id');
  const namaUrl = params.get('n');  // nama dari URL (opsional, untuk tampilan awal)

  // Tampilkan nama dari URL saat loading (sebelum data masuk)
  if (namaUrl) {
    const decoded = decodeURIComponent(namaUrl);
    document.querySelector('#loadingScreen p').textContent = 'Memuat data ' + decoded + '...';
    document.title = decoded + ' – DiVA';
  }

  if (!link_id) {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('errorScreen').classList.add('show');
    return;
  }

  try {
    muridData = await API.getMuridByLink(link_id);
    if (!muridData || !muridData.id) throw new Error('Murid tidak ditemukan');

    if (muridData.guru_id) {
      try {
        const allGuru = await API.getGuru() || [];
        guruData = allGuru.find(g => g.id === muridData.guru_id);
      } catch(e) {}
    }

    allSesi = await API.getSesi({ murid_id: muridData.id }) || [];

    // Hero
    const initial = muridData.nama ? muridData.nama.charAt(0).toUpperCase() : '?';
    document.getElementById('studentAvatar').textContent = initial;
    document.getElementById('studentName').textContent   = muridData.nama || '–';
    document.getElementById('chipProgram').textContent   = muridData.program || '–';
    document.getElementById('chipGuru').textContent      = '🎼 ' + (guruData ? guruData.nama : '–');

    const paket = Number(muridData.paket_sesi || 0);
    const sisa  = Number(muridData.sisa_sesi  ?? paket);
    document.getElementById('chipSisa').textContent = sisa + ' sesi tersisa';

    // Set month default
    document.getElementById('filterHBulan').value = thisBulan();

    // Render beranda components
    renderPaketWidget(paket, sisa);
    renderRecentKBM();
    renderInfoSaya();

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appShell').style.display      = 'block';
  } catch(e) {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('errorScreen').classList.add('show');
    console.error(e);
  }
}

// ── PAKET COUNTDOWN ──────────────────────────────────
function renderPaketWidget(paket, sisa) {
  const el = document.getElementById('paketWidget');
  if (!paket) {
    el.innerHTML = `
      <div class="section-card">
        <div class="card-title">🎯 Paket Sesi</div>
        <div class="empty-state">Belum ada paket sesi.<br>Hubungi admin DiVA.</div>
      </div>`;
    return;
  }

  const pct  = Math.max(0, Math.min(1, sisa / paket));
  const barW = Math.round(pct * 100);
  const isLow = sisa <= Math.ceil(paket * 0.25);
  const warnHtml = isLow
    ? `<div class="paket-warn">⚠️ Sesi hampir habis! Segera hubungi admin untuk top-up.</div>`
    : '';

  el.innerHTML = `
    <div class="paket-card">
      <div class="paket-label">Paket Sesi Aktif</div>
      <div class="paket-countdown">
        <div class="paket-sisa">${sisa}</div>
        <div class="paket-from">/ ${paket}</div>
      </div>
      <div class="paket-label2">sesi tersisa</div>
      <div class="paket-bar-wrap">
        <div class="paket-bar" style="width:${barW}%;background:${isLow ? '#F59E0B' : 'var(--teal)'}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;opacity:.6">
        <span>${paket - sisa} sesi terpakai</span>
        <span>${sisa} sesi tersisa</span>
      </div>
      ${warnHtml}
    </div>`;
}

// ── RECENT KBM ───────────────────────────────────────
function renderRecentKBM() {
  const el = document.getElementById('recentKBM');
  const recent = [...allSesi].sort((a,b) => b.tanggal > a.tanggal ? 1 : -1).slice(0, 4);
  if (!recent.length) {
    el.innerHTML = '<div class="empty-state">Belum ada KBM tercatat</div>';
    return;
  }
  el.innerHTML = recent.map(s => kbmCardHtml(s)).join('');
}

function kbmCardHtml(s) {
  return `
  <div class="kbm-card">
    <div class="kbm-head">
      <div>
        <div class="kbm-tgl">📅 ${s.tanggal || '–'}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Guru: ${guruData ? guruData.nama : '–'}</div>
      </div>
      <span class="badge badge-teal">✓ Hadir</span>
    </div>
    ${s.today_lesson ? `
    <div class="kbm-body">
      <div class="kbm-lesson">📖 <b>Materi:</b> ${s.today_lesson}</div>
    </div>` : ''}
  </div>`;
}

// ── INFO SAYA ─────────────────────────────────────────
function renderInfoSaya() {
  const el = document.getElementById('infoSaya');
  const paket = Number(muridData.paket_sesi || 0);
  const sisa  = Number(muridData.sisa_sesi  ?? paket);
  el.innerHTML = `
    <div class="info-row"><span style="color:var(--muted)">Nama</span><b>${muridData.nama || '–'}</b></div>
    <div class="info-row"><span style="color:var(--muted)">Program</span><span class="badge ${progBadgeClass(muridData.program)}">${muridData.program || '–'}</span></div>
    <div class="info-row"><span style="color:var(--muted)">Guru</span><b>${guruData ? guruData.nama : '–'}</b></div>
    <div class="info-row"><span style="color:var(--muted)">No. HP</span><b>${muridData.no_hp || '–'}</b></div>
    <div class="info-row"><span style="color:var(--muted)">Paket Sesi</span><b>${paket} sesi</b></div>
    <div class="info-row"><span style="color:var(--muted)">Terpakai</span><b>${paket - sisa} sesi</b></div>
    <div class="info-row"><span style="color:var(--muted)">Sisa</span><b style="color:var(--teal)">${sisa} sesi</b></div>
    <div class="info-row"><span style="color:var(--muted)">Total KBM</span><b>${allSesi.length} sesi</b></div>
  `;
}

// ── HISTORI KBM ──────────────────────────────────────
function loadHistoriMurid() {
  const bulan = document.getElementById('filterHBulan').value;
  const el    = document.getElementById('historiList');
  let list = allSesi;
  if (bulan) list = list.filter(s => (s.bulan || s.tanggal?.substring(0,7)) === bulan);
  list = [...list].sort((a,b) => b.tanggal > a.tanggal ? 1 : -1);

  if (!list.length) {
    el.innerHTML = `<div class="empty-state">Tidak ada KBM${bulan ? ' di ' + bulan : ''}</div>`;
    return;
  }
  el.innerHTML = `
    <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">
      ${bulan || 'Semua'} · ${list.length} sesi
    </div>
    ${list.map(s => kbmCardHtml(s)).join('')}
  `;
}

// ── SPP ───────────────────────────────────────────────
function renderSPP() {
  const el = document.getElementById('sppContent');
  const paket = Number(muridData.paket_sesi || 0);
  const sisa  = Number(muridData.sisa_sesi  ?? paket);
  const sudah = !!muridData.tgl_bayar_spp;

  const sppBanner = muridData.nominal_spp ? `
    <div class="spp-banner ${sudah ? 'spp-sudah' : 'spp-belum'}">
      <div>
        <div style="font-size:11px;opacity:.8;font-weight:700;margin-bottom:4px">Nominal SPP</div>
        <div class="spp-val">${fmt(muridData.nominal_spp)}</div>
        <div class="spp-sub">${sudah ? '✓ Sudah dibayar' : '⏳ Belum dibayar'}</div>
      </div>
      <span style="font-size:36px">${sudah ? '✅' : '⏳'}</span>
    </div>
    <div class="section-card">
      <div class="info-row"><span style="color:var(--muted)">Nominal SPP</span><b>${fmt(muridData.nominal_spp)}</b></div>
      <div class="info-row"><span style="color:var(--muted)">Tgl Bayar</span><b>${muridData.tgl_bayar_spp || 'Belum'}</b></div>
      <div class="info-row"><span style="color:var(--muted)">Status</span>
        ${sudah ? '<span class="badge badge-green">✓ Sudah Bayar</span>' : '<span class="badge badge-yellow">⏳ Belum Bayar</span>'}
      </div>
    </div>
  ` : `<div class="empty-state">Belum ada data SPP</div>`;

  el.innerHTML = `
    ${sppBanner}
    <div class="section-card">
      <div class="card-title">🎯 Status Paket Sesi</div>
      <div class="info-row"><span style="color:var(--muted)">Paket Aktif</span><b>${paket} sesi</b></div>
      <div class="info-row"><span style="color:var(--muted)">Terpakai</span><b>${paket - sisa} sesi</b></div>
      <div class="info-row"><span style="color:var(--muted)">Sisa</span><b style="color:${sisa <= Math.ceil(paket*.25) ? 'var(--red)' : 'var(--teal)'}">${sisa} sesi</b></div>
      <div style="padding-top:10px">
        <div class="paket-bar-wrap" style="background:#F3F4F6">
          <div class="paket-bar" style="width:${paket ? Math.round((sisa/paket)*100) : 0}%;background:${sisa <= Math.ceil(paket*.25) ? 'var(--gold)' : 'var(--teal)'}"></div>
        </div>
      </div>
    </div>

    <div style="text-align:center;padding:16px;font-size:12px;color:var(--muted)">
      Hubungi admin DiVA untuk konfirmasi pembayaran atau top-up sesi
    </div>
  `;
}

init();
</script>
</body>
</html>
